<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>내 문의 내역</title>
    <style>
        /* 기본 레이아웃 스타일 */
        .inquiry-item { border-bottom: 1px solid #eee; padding: 20px 0; }
        .inquiry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .inquiry-title { font-size: 18px; font-weight: bold; color: #333; text-decoration: none; }
        .inquiry-date { font-size: 14px; color: #999; }
        .inquiry-content { font-size: 14px; color: #666; margin-bottom: 10px; }

        /* 배지 스타일 */
        .badge { padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-waiting { background-color: #f1f3f5; color: #495057; }
        .badge-done { background-color: #d3f9d8; color: #2b8a3e; }

        /* 글쓰기 버튼 스타일 */
        .btn-write { float: right; background-color: #198754; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 20px;}
    </style>
</head>

<body>

<div style="max-width: 800px; margin: 0 auto; padding: 40px 20px;">

    <h2>1:1 문의 내역</h2>
    <hr>

    <div class="inquiry-list">
        <div th:if="${list.isEmpty()}" style="text-align: center; padding: 50px; color: #999;">
            문의하신 내역이 없습니다.
        </div>

        <div th:each="inquiry : ${list}" class="inquiry-item">
            <div class="inquiry-header">
                <a th:href="@{/inquiry/view/{id}(id=${inquiry.id})}" class="inquiry-title" th:text="${inquiry.title}">
                    테스트 문의 제목입니다
                </a>
                <span class="inquiry-date" th:text="${#temporals.format(inquiry.createdAt, 'yyyy/MM/dd')}">
                    2026/01/10
                </span>
            </div>

            <p class="inquiry-content" th:text="${inquiry.content}">
                문의 내용이 들어갑니다...
            </p>

            <div>
                <span th:if="${inquiry.status.name() == 'WAITING'}" class="badge badge-waiting">답을 기다리며</span>
                <span th:unless="${inquiry.status.name() == 'WAITING'}" class="badge badge-done">답변 완료</span>
            </div>
        </div>
    </div>

    <div th:if="${!list.isEmpty()}">
        <ul class="pagination" style="display: flex; justify-content: center; list-style: none; padding: 0; margin-top: 30px; gap: 5px;">

            <li th:classappend="${!list.hasPrevious} ? 'disabled'">
                <a class="page-link" th:href="@{/inquiry/list(page=${list.number - 1})}"
                   style="padding: 8px 12px; border: 1px solid #ddd; color: #333; text-decoration: none; border-radius: 4px;">
                    이전
                </a>
            </li>

            <li th:each="page : ${#numbers.sequence(startPage, endPage)}">
                <a th:if="${page != nowPage}" th:href="@{/inquiry/list(page=${page - 1})}" th:text="${page}"
                   style="padding: 8px 12px; border: 1px solid #ddd; color: #333; text-decoration: none; border-radius: 4px;"></a>

                <span th:if="${page == nowPage}" th:text="${page}"
                      style="padding: 8px 12px; border: 1px solid #007bff; background-color: #007bff; color: white; border-radius: 4px;"></span>
            </li>

            <li th:classappend="${!list.hasNext} ? 'disabled'">
                <a class="page-link" th:href="@{/inquiry/list(page=${list.number + 1})}"
                   style="padding: 8px 12px; border: 1px solid #ddd; color: #333; text-decoration: none; border-radius: 4px;">
                    다음
                </a>
            </li>
        </ul>
    </div>

    <div style="overflow: hidden;">
        <a href="/inquiry/write" class="btn-write">신규문의</a>
    </div>

</div>

</body>
</html>
