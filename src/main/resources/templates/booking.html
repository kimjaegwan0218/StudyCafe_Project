<!DOCTYPE html>
<html lang="ja" xmlns:sec="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Booking | StudyCafe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ✅ JS 먼저 -->
  <script defer src="/assets/js/app.js"></script>
  <script defer src="/assets/js/booking.js"></script>
  <!-- ✅ Alpine 나중 -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    [x-cloak] { display: none !important; }
  </style>

  <!-- ✅ 로그인 유저ID 주입 (컨트롤러/서비스가 userId 필요로 하는 구조면 필수) -->
  <script th:inline="javascript">
    window.__USER_ID__ = /*[[${#authentication.principal.user.id}]]*/ null;
  </script>
</head>

<body x-data="app()" class="bg-slate-50 text-slate-800">

<!-- ================= NAV ================= -->
<nav class="bg-white shadow-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
    <a href="/admin" class="text-2xl font-bold text-emerald-800">StudyCafe.</a>

    <div class="hidden md:flex space-x-6 font-bold text-sm items-center">

      <!-- 공지 -->
      <div class="relative inline-flex items-center h-full font-bold text-sm"
           x-data="{ open:false }"
           @mouseenter="open=true" @mouseleave="open=false">

        <a href="/news" class="py-4 hover:text-emerald-700 transition">공지</a>

        <div x-cloak x-show="open"
             class="absolute top-full left-0 mt-2 w-48 bg-white border rounded-xl shadow-lg overflow-hidden z-50"
             x-transition>
          <a href="/price" class="block px-4 py-3 text-sm hover:bg-slate-50">요금 안내</a>
          <a href="/faq" class="block px-4 py-3 text-sm hover:bg-slate-50">FAQ</a>
          <a href="/info" class="block px-4 py-3 text-sm hover:bg-slate-50">기본정보 • 지도</a>
        </div>
      </div>

      <!-- 예약 -->
      <div class="relative" x-data="{ open:false }"
           @mouseenter="open=true" @mouseleave="open=false">

        <a href="/booking" class="text-emerald-700">예약</a>

        <div x-cloak x-show="open"
             class="absolute left-0 mt-2 w-32 bg-white border rounded-xl shadow-lg overflow-hidden z-50">
          <a href="/subscription" class="block px-4 py-3 text-sm hover:bg-slate-50">구독 구매</a>
        </div>
      </div>

      <a href="/service">서비스</a>
      <a href="/community">커뮤니티</a>

      <!-- 로그인 전 -->
      <div sec:authorize="isAnonymous()">
        <a href="/login" class="bg-emerald-800 hover:bg-emerald-900 text-white px-6 py-2 rounded-full font-bold transition shadow-sm text-xs">
          로그인
        </a>
      </div>

      <!-- 로그인 후 -->
      <div sec:authorize="isAuthenticated()" class="flex items-center space-x-6">
        <a href="/mypage" class="text-emerald-700 font-bold">내 페이지</a>
        <form th:action="@{/logout}" method="post" class="inline">
          <button class="text-slate-400 hover:text-red-500 transition ml-4">로그아웃</button>
        </form>
      </div>

    </div>
  </div>
</nav>

<!-- ================= MAIN ================= -->
<main
        x-data="bookingPage()"
        x-init="init()"
        class="max-w-3xl mx-auto mt-10 p-4"
>
  <h2 class="text-3xl font-black mb-10 text-center text-emerald-900">
    좌석 예약 흐름
  </h2>

  <!-- ================= STEP PROGRESS (1~4) ================= -->
  <div class="flex justify-between mb-10 px-4">
    <template x-for="step in [1, 2, 3, 4]" :key="step">
      <div class="flex items-center flex-1 last:flex-none">
        <div class="flex flex-col items-center"
             :class="bookingStep >= step ? 'text-emerald-700 font-bold' : 'text-gray-400'">
          <span
                  class="w-10 h-10 border-2 rounded-full flex items-center justify-center mb-1 text-sm transition"
                  :class="bookingStep >= step ? 'border-emerald-700 bg-emerald-50' : 'border-gray-300'"
                  x-text="step"
          ></span>
          <span class="text-[10px]" x-text="['날짜/시간/플랜','좌석','확인','결제'][step-1]"></span>
        </div>

        <div
                x-show="step < 4"
                class="flex-1 border-t-2 mt-[-15px] mx-4 transition"
                :class="bookingStep > step ? 'border-emerald-700' : 'border-gray-200'"
        ></div>
      </div>
    </template>
  </div>

  <!-- 에러 메시지 -->
  <div x-cloak x-show="errorMsg" class="mb-6 p-4 rounded-2xl bg-red-50 border border-red-200 text-sm text-red-700">
    <span class="font-bold">오류: </span><span x-text="errorMsg"></span>
  </div>

  <!-- ================= STEP 1 ================= -->
  <div x-cloak x-show="bookingStep === 1" class="bg-white p-8 rounded-3xl shadow-lg border">
    <div class="space-y-6">

      <div>
        <label class="block font-bold mb-2">이용일</label>
        <input type="date"
               x-model="selectedDate"
               class="w-full border p-4 rounded-xl bg-slate-50 outline-none">
      </div>

      <div>
        <label class="block font-bold mb-2">시작 시간 (10분 단위)</label>
        <select x-model="selectedTime"
                class="w-full border p-4 rounded-xl bg-slate-50 outline-none">
          <template x-for="h in [...Array(24).keys()].reverse()" :key="h">
            <template x-for="m in ['00','10','20','30','40','50']" :key="m">
              <option :value="`${String(h).padStart(2,'0')}:${m}`"
                      x-text="`${String(h).padStart(2,'0')}:${m}`"></option>
            </template>
          </template>
        </select>
      </div>

      <div>
        <label class="block font-bold mb-4">이용 플랜</label>
        <div class="grid grid-cols-2 gap-3">
          <template x-for="plan in plans" :key="plan.hours">
            <button
                    type="button"
                    @click="selectPlan(plan)"
                    class="border-2 p-4 rounded-xl text-left font-black transition"
                    :class="selectedPlan?.hours === plan.hours
                ? 'border-emerald-600 bg-emerald-50 text-emerald-800'
                : 'border-slate-100 text-slate-500'">
              <span x-text="plan.name"></span><br>
              <span class="text-xl" x-text="`${Number(plan.price).toLocaleString()}원`"></span>
            </button>
          </template>
        </div>
      </div>

      <button type="button"
              @click="goToSeatSelect()"
              :disabled="!selectedDate || !selectedPlan"
              class="w-full bg-emerald-700 text-white py-4 rounded-2xl font-bold disabled:opacity-50">
        좌석 선택으로 이동
      </button>

    </div>
  </div>

  <!-- ================= STEP 2 ================= -->
  <div x-cloak x-show="bookingStep === 2" class="bg-white p-8 rounded-3xl shadow-lg border">
    <div class="mb-6 p-4 bg-slate-50 rounded-2xl text-xs space-y-1">
      <p class="font-bold text-slate-700">【추가 요금 안내】</p>
      <p class="text-red-600">■ 빨간색（커플석）：+<span x-text="getCoupleSurcharge().toLocaleString()"></span>원</p>
      <p class="text-yellow-600">■ 노란색（회의실）：+<span x-text="getMeetingSurcharge().toLocaleString()"></span>원</p>
    </div>

    <div class="grid grid-cols-6 gap-3 mb-8">
      <template x-for="seat in seats" :key="seat.id">
        <div
                @click="selectSeat(seat)"
                class="h-14 flex items-center justify-center rounded-xl font-bold cursor-pointer transition"
                :class="{
            'bg-slate-300 opacity-40 cursor-not-allowed': seat.status === 'occupied',
            'bg-emerald-500 text-white': seat.status === 'open' && seat.type === 'normal',
            'bg-red-500 text-white': seat.status === 'open' && seat.type === 'couple',
            'bg-yellow-400 text-slate-900': seat.status === 'open' && seat.type === 'meeting',
            'ring-4 ring-blue-500 scale-105': selectedSeat?.id === seat.id
          }"
                x-text="seat.id"
        ></div>
      </template>
    </div>

    <div class="flex space-x-4">
      <button type="button"
              @click="bookingStep = 1"
              class="flex-1 bg-slate-100 py-4 rounded-xl font-bold">
        뒤로
      </button>

      <button type="button"
              @click="bookingStep = 3"
              :disabled="!selectedSeat"
              class="flex-1 bg-emerald-700 text-white py-4 rounded-xl font-bold disabled:opacity-50">
        확인으로 이동
      </button>
    </div>
  </div>

  <!-- ================= STEP 3 ================= -->
  <div x-cloak x-show="bookingStep === 3" class="bg-white p-8 rounded-3xl shadow-lg border">
    <div class="space-y-4 mb-8 text-sm">

      <div class="flex justify-between border-b pb-2">
        <span>이용일</span>
        <span class="font-bold" x-text="selectedDate"></span>
      </div>

      <div class="flex justify-between border-b pb-2">
        <span>시작 시간</span>
        <span class="font-bold" x-text="selectedTime"></span>
      </div>

      <div class="flex justify-between border-b pb-2">
        <span>이용 플랜</span>
        <span class="font-bold" x-text="selectedPlan?.name"></span>
      </div>

      <div class="flex justify-between border-b pb-2">
        <span>좌석</span>
        <span class="font-bold" x-text="`${selectedSeat?.id}번 좌석`"></span>
      </div>

      <!-- 금액 -->
      <div class="space-y-2 pt-4 border-t text-sm">

        <!-- ✅ 구독 적용 문구(구독자면 표시) -->
        <p class="text-xs text-emerald-700 font-bold mt-2"
           x-show="subscriptionActive && previewBasePrice() === 0">
          ✅ 구독 적용: 기본요금 무료(0원)
        </p>

        <div class="flex justify-between">
          <span>기본 요금</span>
          <span x-text="`${previewBasePrice().toLocaleString()}원`"></span>
        </div>

        <div class="flex justify-between" x-show="getSeatExtraPrice() > 0">
          <span>
            좌석 추가 요금
            <span class="text-xs text-slate-400">
            (
            <span x-text="selectedSeat?.type === 'couple' ? '커플석' : '회의실'"></span>
            )
            </span>
          </span>
          <span x-text="`+${getSeatExtraPrice().toLocaleString()}원`"></span>
        </div>

        <div class="flex justify-between pt-2 font-black text-lg">
          <span>총 금액</span>
          <span class="text-emerald-700" x-text="`${previewTotalPrice().toLocaleString()}원`"></span>
        </div>
      </div>

    </div>

    <div class="flex space-x-4">
      <button type="button"
              @click="bookingStep = 2"
              class="flex-1 bg-slate-100 py-4 rounded-xl font-bold">
        뒤로
      </button>

      <button type="button"
              @click="submitReservation()"
              :disabled="submitting"
              class="flex-1 bg-emerald-700 text-white py-4 rounded-xl font-bold disabled:opacity-50">
        결제 진행
      </button>
    </div>
  </div>

  <!-- ================= STEP 4 ================= -->
  <div x-cloak x-show="bookingStep === 4" class="bg-white p-10 rounded-3xl shadow-lg border text-center">
    <h3 class="text-xl font-black text-emerald-900 mb-2">결제 페이지로 이동 중...</h3>
    <p class="text-slate-500 text-sm">잠시만 기다려주세요.</p>
  </div>

</main>

</body>
</html>
