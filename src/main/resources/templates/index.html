<!DOCTYPE html>
<html lang="ja" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>StudyCafe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="assets/js/app.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>


    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        .carousel-track { display: flex; width: calc(400px * 10); animation: scroll 40s linear infinite; }
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        [x-cloak] { display: none !important; }
    </style>
</head>

<body x-data="app()" class="bg-slate-50 text-slate-800">

<!-- ================= NAV ================= -->
<nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/admin" class="text-2xl font-bold text-emerald-800">StudyCafe.</a>
        <div class="hidden md:flex space-x-6 font-bold text-sm items-center">

            <!-- 공지(드롭다운: 요금 안내/FAQ/기본정보•지도) -->
            <div class="relative inline-flex items-center h-full font-bold text-sm"
                 x-data="{ open:false }"
                 @mouseenter="open=true" @mouseleave="open=false">

                <a href="/news" class="py-4 hover:text-emerald-700 transition">공지</a>

                <div x-cloak x-show="open"
                     class="absolute top-full left-0 mt-2 w-48 bg-white border rounded-xl shadow-lg overflow-hidden z-50"
                     x-transition>
                    <a href="/price" class="block px-4 py-3 text-sm hover:bg-slate-50">요금 안내</a>
                    <a href="/faq" class="block px-4 py-3 text-sm hover:bg-slate-50">FAQ</a>
                    <a href="/info" class="block px-4 py-3 text-sm hover:bg-slate-50">기본정보 • 지도</a>
                </div>
            </div>
            <!-- 예약(드롭다운: 예약/구독) -->
            <div class="relative"
                 x-data="{ open:false, path: window.location.pathname }"
                 @mouseenter="open=true" @mouseleave="open=false">

                <!-- ✅ 상단 '예약'은 booking/subscription일 때만 초록 -->
                <a href="/booking"
                   :class="(path.startsWith('/booking') || path.startsWith('/subscription'))
              ? 'text-emerald-700'
              : ''">
                    예약
                </a>

                <div x-cloak x-show="open"
                     class="absolute left-0 mt-2 w-32 bg-white border rounded-xl shadow-lg overflow-hidden z-50">

                    <!-- ✅ 드롭다운 내부도 현재 페이지면 강조 -->
                    <a href="/subscription"
                       class="block px-4 py-3 text-sm hover:bg-slate-50"
                       :class="path.startsWith('/subscription') ? 'text-emerald-700 font-bold' : ''">
                        구독 구매
                    </a>
                </div>
            </div>
            <a href="/service" class="hover:text-emerald-700 transition">서비스</a>
            <a href="/community" class="hover:text-emerald-700 transition">커뮤니티</a>

            <!-- 로그인 전 -->
            <div sec:authorize="isAnonymous()">
                <a href="/login" class="bg-emerald-800 hover:bg-emerald-900 text-white px-6 py-2 rounded-full font-bold transition shadow-sm text-xs">
                    로그인
                </a>
            </div>

            <div sec:authorize="isAuthenticated()" class="flex items-center space-x-6">
                <a href="/mypage" class="text-emerald-700 font-bold">내 페이지</a>
                <form th:action="@{/logout}" method="post" class="inline">
                    <button class="text-slate-400 hover:text-red-500 transition ml-4">로그아웃</button>
                </form>
            </div>


        </div>
    </div>
</nav>

<!-- ================= MAIN ================= -->
<main class="max-w-7xl mx-auto mt-6 p-4">

    <!-- HERO / CAROUSEL -->
    <section class="mb-10 overflow-hidden rounded-3xl shadow-xl bg-white p-2">
        <div class="carousel-track">
            <div class="w-[400px] h-72 px-2">
                <img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=800"
                     class="rounded-2xl object-cover w-full h-full">
            </div>
            <div class="w-[400px] h-72 px-2">
                <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?w=800"
                     class="rounded-2xl object-cover w-full h-full">
            </div>
            <div class="w-[400px] h-72 px-2">
                <img src="https://images.unsplash.com/photo-1521017432531-fbd92d768814?w=800"
                     class="rounded-2xl object-cover w-full h-full">
            </div>
            <div class="w-[400px] h-72 px-2">
                <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=800"
                     class="rounded-2xl object-cover w-full h-full">
            </div>
        </div>
    </section>

    <!-- COPY -->
    <div class="text-center py-12">
        <h1 class="text-5xl font-black text-slate-900 mb-6 leading-tight">
            고요함과 자극이 공존하는,<br>당신을 위한 서재
        </h1>

        <p class="text-slate-500 text-lg max-w-2xl mx-auto">
            24시간 365일 예약부터 커뮤니티까지.
            학습에 집중하기 위한 모든 것을 여기에.
        </p>

        <div class="flex justify-center mt-10">
            <a href="/booking"
               class="bg-emerald-700 text-white px-11 py-6 rounded-full font-bold
                      shadow-2xl hover:bg-emerald-800 hover:scale-105 transition-all text-xl">
                지금 바로 예약
            </a>
        </div>
    </div>

</main>

<!-- ================= FOOTER ================= -->
<footer class="mt-24 py-16 bg-slate-900 text-white text-center">
    <p class="text-4xl font-black italic text-emerald-500 mb-4">StudyCafe.</p>
    <p class="text-[10px] text-slate-600">
        © 2024 Study Cafe Premium Space.
    </p>
</footer>

</body>
</html>
