
<!DOCTYPE html>
<html lang="ja" xmlns:layout="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <title>Community | StudyCafe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- JS 순서 고정 -->
  <script defer src="/assets/js/app.js"></script>
  <script defer src="/assets/js/community.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>[x-cloak]{display:none!important}</style>
</head>

<body x-data="app()" class="bg-slate-50 text-slate-800">

<nav class="bg-white shadow sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
    <a href="/" class="text-2xl font-bold text-emerald-800">StudyCafe.</a>
    <div class="hidden md:flex space-x-6 font-bold text-sm items-center">

      <!-- 공지(드롭다운: 요금 안내/FAQ/기본정보•지도) -->
      <div class="relative inline-flex items-center h-full font-bold text-sm"
           x-data="{ open:false }"
           @mouseenter="open=true" @mouseleave="open=false">

        <a href="/news" class="py-4 hover:text-emerald-700 transition">공지</a>

        <div x-cloak x-show="open"
             class="absolute top-full left-0 mt-2 w-48 bg-white border rounded-xl shadow-lg overflow-hidden z-50"
             x-transition>
          <a href="/price" class="block px-4 py-3 text-sm hover:bg-slate-50">요금 안내</a>
          <a href="/faq" class="block px-4 py-3 text-sm hover:bg-slate-50">FAQ</a>
          <a href="/info" class="block px-4 py-3 text-sm hover:bg-slate-50">기본정보 • 지도</a>
        </div>
      </div>
      <!-- 예약(드롭다운: 예약/구독) -->
      <div class="relative"
           x-data="{ open:false, path: window.location.pathname }"
           @mouseenter="open=true" @mouseleave="open=false">

        <a href="/booking"
           :class="(path.startsWith('/booking') || path.startsWith('/subscription')) ? 'text-emerald-700' : ''">
          예약
        </a>

        <div x-cloak x-show="open"
             class="absolute left-0 mt-2 w-32 bg-white border rounded-xl shadow-lg overflow-hidden z-50">

          <a href="/subscription"
             class="block px-4 py-3 text-sm hover:bg-slate-50"
             :class="path.startsWith('/subscription') ? 'text-emerald-700 font-bold' : ''">
            구독 구매
          </a>
        </div>
      </div>
      <a href="/service" class="hover:text-emerald-700 transition">서비스</a>
      <a href="/community" class="hover:text-emerald-700 transition">커뮤니티</a>

      <div sec:authorize="isAnonymous()">
        <a href="/login" class="bg-emerald-800 hover:bg-emerald-900 text-white px-6 py-2 rounded-full font-bold transition shadow-sm text-xs">
          로그인
        </a>
      </div>

      <div sec:authorize="isAuthenticated()" class="flex items-center space-x-6">
        <a href="/mypage" class="text-emerald-700 font-bold">내 페이지</a>
        <form th:action="@{/logout}" method="post" class="inline">
          <button class="text-slate-400 hover:text-red-500 transition ml-4">로그아웃</button>
        </form>
      </div>

    </div>
  </div>
</nav>

<div layout:fragment="content">

  <div class="body">
    <main x-data="communityPage()" class="max-w-4xl mx-auto mt-10 p-4">
      <!--                        <div layout:fragment="content">-->
      <!--                        </div>-->

      <!-- ===== LIST ===== -->

      <div class="mb-12">
        <h3 class="text-xl font-bold text-orange-600 mb-6 flex items-center gap-2">
          🔥 인기 게시판 TOP 3
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <th:block th:each="top : ${top3List}">
            <div th:onclick="|location.href='/community/read/' + ${top.id}|"
                 class="bg-white p-6 rounded-3xl border border-orange-100 shadow-sm hover:shadow-md cursor-pointer transition-all group">
              <p class="font-bold text-slate-800 mb-4 truncate group-hover:text-orange-600" th:text="${top.title}">제목</p>
              <div class="flex justify-between items-center text-xs text-slate-400">
                <span th:text="${top.userName}">작성자</span>
                <span class="font-bold text-orange-500">❤️ [[${top.likedCount}]]</span>
              </div>
            </div>
          </th:block>
        </div>
      </div>

      <div class="flex justify-between items-center mb-8">
        <h2 class="text-3xl font-black text-slate-800">게시판</h2>
        <a th:href="@{/community/register}"
           class="bg-emerald-700 text-white px-8 py-3 rounded-full font-bold hover:bg-emerald-800 transition-all shadow-lg shadow-emerald-100">
          + 기록 쓰기
        </a>
      </div>


      <div class="bg-white rounded-3xl border shadow overflow-hidden">

        <th:block th:if="${responseDTO != null}">

          <div th:each="dto : ${responseDTO.dtoList}"
               th:if="${responseDTO.dtoList != null}"
               th:onclick="|location.href='/community/read/' + ${dto.id}|"
               class="p-6 hover:bg-slate-50 cursor-pointer flex justify-between items-center transition-all group border-b last:border-0">
            <div>
              <p class="font-bold text-lg text-slate-800" th:text="${dto.title}"></p>
              <p class="text-xs text-slate-400 mt-2">
                <span th:text="${dto.userName}"></span> |
                <span th:text="${#temporals.format(dto.createdAt, 'yyyy.MM.dd')}"></span>
              </p>
            </div>
            <div class="text-rose-500 font-bold">❤️ [[${dto.likedCount}]]</div>
          </div>
        </th:block>
      </div>

      <!--  페이징 처리-->

      <div class="flex justify-center mt-8">
        <form th:action="@{/templates/community}" method="get" id="f1">
          <input type="hidden" name="size" th:value="${responseDTO.size}">
        </form>

        <ul class="flex space-x-2 pagination">
          <li class="page-item">
            <a th:class="${!responseDTO.prev} ?
                                        'page-link px-4 py-2 border rounded-lg text-slate-300 cursor-not-allowed' :
                                        'page-link px-4 py-2 border rounded-lg hover:bg-slate-100 cursor-pointer'"
               th:data-num="${responseDTO.start - 1}">이전</a>
          </li>
          <th:block th:each="i: ${#numbers.sequence(responseDTO.start, responseDTO.end)}">
            <li th:class="${responseDTO.page == i} ? 'page-item active' : 'page-item'">
              <a th:class="${responseDTO.page == i} ?
                                            'page-link px-4 py-2 bg-emerald-700 text-white rounded-lg font-bold' :
                                            'page-link px-4 py-2 border rounded-lg hover:bg-slate-100 cursor-pointer'"
                 th:data-num="${i}">[[${i}]]</a>
            </li>
          </th:block>
          <li class="page-item" th:if="${responseDTO.next}">
            <a class="page-link px-4 py-2 border rounded-lg hover:bg-slate-100 cursor-pointer"
               th:data-num="${responseDTO.end + 1}">다음</a>
          </li>
        </ul>
      </div>
    </main>
  </div>
</div>

<script layout:fragment="script" th:inline="javascript">

  document.querySelector(".pagination").addEventListener("click", function (e) {
    e.preventDefault();
    e.stopPropagation();

    const target = e.target;

    // 1. A 태그가 아니면 무시
    if (target.tagName !== 'A') return;

    // 2. 비활성화된 '이전' 버튼 클릭 방지
    if (target.classList.contains('cursor-not-allowed')) return;

    const num = target.getAttribute("data-num");
    const formObj = document.querySelector("#f1");

    // 3. 중복 input 방지를 위해 기존 input[name='page']가 있다면 값만 수정, 없으면 새로 생성
    let pageInput = formObj.querySelector("input[name='page']");
    if (!pageInput) {
      pageInput = document.createElement("input");
      pageInput.type = "hidden";
      pageInput.name = "page";
      formObj.appendChild(pageInput);
    }

    pageInput.value = num;

    // 4. 전송 (action이 "/community/list" 절대경로인지 다시 확인)
    formObj.submit();

  }, false);

  document.addEventListener("DOMContentLoaded", function() {
    // 타임리프를 통해 서버에서 보낸 result 값을 가져옴
    const result = [[${result}]];

    console.log("등록 결과:", result); // 브라우저 개발자 도구(F12)에서 확인용

    if (result) {
      alert("커뮤니티 게시글 등록이 완료되었습니다.");
    }
  });

</script>


<!-- ===== DETAIL ===== -->
<div x-cloak x-show="view==='detail'">
  <button @click="view='list'" class="mb-6 text-emerald-600 font-bold">← 뒤로</button>

  <div class="bg-white p-8 rounded-3xl shadow border">
    <div class="flex justify-between mb-4">
      <h3 class="text-2xl font-black" x-text="selectedPost.title"></h3>

      <template x-if="selectedPost.authorId === user.id">
        <div class="space-x-2">
          <button @click="view='edit'"
                  class="text-xs bg-slate-100 px-4 py-1 rounded-full">수정</button>
          <button @click="deletePost()"
                  class="text-xs bg-red-100 text-red-600 px-4 py-1 rounded-full">삭제</button>
        </div>
      </template>
    </div>

    <p class="text-sm text-slate-400 mb-6"
       x-text="`${selectedPost.author} | ${selectedPost.date}`"></p>

    <p class="mb-6 text-slate-700" x-text="selectedPost.content"></p>

    <button @click="toggleLike(selectedPost)"
            class="mb-6 font-bold">
      ❤️ <span x-text="selectedPost.likes"></span>
    </button>

    <!-- COMMENTS -->
    <div class="border-t pt-6 space-y-4">
      <h4 class="font-bold">💬 코멘트</h4>

      <template x-for="c in selectedPost.comments" :key="c.id">
        <div class="bg-slate-50 p-4 rounded-xl">
          <p class="font-bold text-sm" x-text="c.user"></p>
          <p class="text-sm text-slate-600" x-text="c.text"></p>
        </div>
      </template>

      <textarea x-model="newComment"
                class="w-full border p-3 rounded-xl"
                placeholder="코멘트 쓰기..."></textarea>

      <button @click="addComment()"
              class="bg-emerald-700 text-white px-6 py-2 rounded-full font-bold">
        보내기
      </button>
    </div>
  </div>
</div>

</main>

</body>
</html>
