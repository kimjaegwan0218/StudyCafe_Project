<!DOCTYPE html>
<html lang="ja" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <title>Community | StudyCafe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- JS 순서 고정 -->
  <script defer src="/assets/js/app.js"></script>
  <script defer src="/assets/js/community.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>[x-cloak]{display:none!important}</style>
</head>

<body x-data="app()" class="bg-slate-50 text-slate-800">

<nav class="bg-white shadow sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
    <a href="/admin" class="text-2xl font-bold text-emerald-800">StudyCafe.</a>
    <div class="hidden md:flex space-x-6 font-bold text-sm items-center">
      <!-- 공지(드롭다운: 요금 안내/FAQ/기본정보•지도) -->
      <div class="relative inline-flex items-center h-full font-bold text-sm"
           x-data="{ open:false }"
           @mouseenter="open=true" @mouseleave="open=false">

        <a href="/news" class="py-4 hover:text-emerald-700 transition">공지</a>

        <div x-cloak x-show="open"
             class="absolute top-full left-0 mt-2 w-48 bg-white border rounded-xl shadow-lg overflow-hidden z-50"
             x-transition>
          <a href="/price" class="block px-4 py-3 text-sm hover:bg-slate-50">요금 안내</a>
          <a href="/faq" class="block px-4 py-3 text-sm hover:bg-slate-50">FAQ</a>
          <a href="/info" class="block px-4 py-3 text-sm hover:bg-slate-50">기본정보 • 지도</a>
        </div>
      </div>
      <!-- 예약(드롭다운: 예약/구독) -->
      <div class="relative"
           x-data="{ open:false, path: window.location.pathname }"
           @mouseenter="open=true" @mouseleave="open=false">

        <!-- ✅ 상단 '예약'은 booking/subscription일 때만 초록 -->
        <a href="/booking"
           :class="(path.startsWith('/booking') || path.startsWith('/subscription'))
              ? 'text-emerald-700'
              : ''">
          예약
        </a>

        <div x-cloak x-show="open"
             class="absolute left-0 mt-2 w-32 bg-white border rounded-xl shadow-lg overflow-hidden z-50">

          <!-- ✅ 드롭다운 내부도 현재 페이지면 강조 -->

          <a href="/subscription"
             class="block px-4 py-3 text-sm hover:bg-slate-50"
             :class="path.startsWith('/subscription') ? 'text-emerald-700 font-bold' : ''">
            구독 구매
          </a>
        </div>
      </div>
      <a href="/service">サービス</a>
      <a href="/community" class="text-emerald-700">コミュニティ</a>

      <!-- 로그인 전 -->
      <div sec:authorize="isAnonymous()">
        <a href="/login" class="bg-emerald-800 hover:bg-emerald-900 text-white px-6 py-2 rounded-full font-bold transition shadow-sm text-xs">
          로그인
        </a>
      </div>

      <div sec:authorize="isAuthenticated()" class="flex items-center space-x-6">
        <a href="/mypage" class="text-emerald-700 font-bold">내 페이지</a>
        <form th:action="@{/logout}" method="post" class="inline">
          <button class="text-slate-400 hover:text-red-500 transition ml-4">로그아웃</button>
        </form>
      </div>
    </div>
  </div>
</nav>

<main x-data="communityPage()" class="max-w-4xl mx-auto mt-10 p-4">

  <!-- ===== LIST ===== -->
  <div x-cloak x-show="view==='list'">
    <div class="flex justify-between items-center mb-8">
      <h2 class="text-3xl font-black">掲示板</h2>
      <button @click="view='write'"
              class="bg-emerald-700 text-white px-6 py-3 rounded-full font-bold">
        + 記録を書く
      </button>
    </div>

    <div class="bg-white rounded-3xl border shadow divide-y">
      <template x-for="post in posts" :key="post.id">
        <div @click="openPost(post)"
             class="p-6 hover:bg-slate-50 cursor-pointer flex justify-between">
          <div>
            <p class="font-bold text-lg" x-text="post.title"></p>
            <p class="text-xs text-slate-400 mt-2"
               x-text="`${post.author} | ${post.date}`"></p>
          </div>
          <div class="font-bold text-slate-400">
            ❤️ <span x-text="post.likes"></span>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- ===== DETAIL ===== -->
  <div x-cloak x-show="view==='detail'">
    <button @click="view='list'" class="mb-6 text-emerald-600 font-bold">← 戻る</button>

    <div class="bg-white p-8 rounded-3xl shadow border">
      <div class="flex justify-between mb-4">
        <h3 class="text-2xl font-black" x-text="selectedPost.title"></h3>

        <template x-if="selectedPost.authorId === user.id">
          <div class="space-x-2">
            <button @click="view='edit'"
                    class="text-xs bg-slate-100 px-4 py-1 rounded-full">編集</button>
            <button @click="deletePost()"
                    class="text-xs bg-red-100 text-red-600 px-4 py-1 rounded-full">削除</button>
          </div>
        </template>
      </div>

      <p class="text-sm text-slate-400 mb-6"
         x-text="`${selectedPost.author} | ${selectedPost.date}`"></p>

      <p class="mb-6 text-slate-700" x-text="selectedPost.content"></p>

      <button @click="toggleLike(selectedPost)"
              class="mb-6 font-bold">
        ❤️ <span x-text="selectedPost.likes"></span>
      </button>

      <!-- COMMENTS -->
      <div class="border-t pt-6 space-y-4">
        <h4 class="font-bold">💬 コメント</h4>

        <template x-for="c in selectedPost.comments" :key="c.id">
          <div class="bg-slate-50 p-4 rounded-xl">
            <p class="font-bold text-sm" x-text="c.user"></p>
            <p class="text-sm text-slate-600" x-text="c.text"></p>
          </div>
        </template>

        <textarea x-model="newComment"
                  class="w-full border p-3 rounded-xl"
                  placeholder="コメントを書く..."></textarea>

        <button @click="addComment()"
                class="bg-emerald-700 text-white px-6 py-2 rounded-full font-bold">
          送信
        </button>
      </div>
    </div>
  </div>

  <!-- ===== WRITE / EDIT ===== -->
  <div x-cloak x-show="view==='write' || view==='edit'">
    <button @click="view='list'" class="mb-6 text-emerald-600 font-bold">← 戻る</button>

    <div class="bg-white p-8 rounded-3xl shadow border">
      <h3 class="text-2xl font-black mb-6"
          x-text="view==='edit' ? '投稿を編集' : '新規投稿'"></h3>

      <input x-model="form.title"
             class="w-full border p-4 rounded-xl mb-4 bg-slate-50"
             placeholder="タイトル">

      <textarea x-model="form.content"
                class="w-full border p-4 rounded-xl h-48 bg-slate-50 mb-6"
                placeholder="内容"></textarea>

      <button @click="submitPost()"
              class="w-full bg-emerald-700 text-white py-4 rounded-xl font-bold">
        保存する
      </button>
    </div>
  </div>

</main>

</body>
</html>
