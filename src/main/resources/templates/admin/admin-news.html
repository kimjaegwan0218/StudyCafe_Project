<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="admin/admin-fragments :: head('StudyCafe Admin - News')"></th:block>
</head>
<body class="bg-slate-50 text-slate-800" x-data="adminApp()" x-cloak>
<th:block th:replace="admin/admin-fragments :: nav('news')"></th:block>

<main class="max-w-7xl mx-auto mt-6 p-4 fade-in">
    <div x-show="subpage === ''">
        <h2 class="text-3xl font-black mb-10 text-center">告知カテゴリー</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <button @click="subpage='news_list'; newsCategory='emergency'; loadNews()" class="p-10 bg-red-50 rounded-3xl border-2 border-red-100 hover:scale-105 transition">
                <span class="text-4xl block mb-4">🚨</span><p class="font-bold text-red-700 text-xl">緊急のお知らせ</p>
            </button>
            <button @click="subpage='news_list'; newsCategory='event'; loadNews()" class="p-10 bg-blue-50 rounded-3xl border-2 border-blue-100 hover:scale-105 transition">
                <span class="text-4xl block mb-4">🎁</span><p class="font-bold text-blue-700 text-xl">イベント告知</p>
            </button>
            <button @click="subpage='news_list'; newsCategory='normal'; loadNews()" class="p-10 bg-slate-50 rounded-3xl border-2 border-slate-100 hover:scale-105 transition">
                <span class="text-4xl block mb-4">📢</span><p class="font-bold text-slate-700 text-xl">通常お知らせ</p>
            </button>
        </div>
    </div>

    <div x-show="subpage === 'news_list'" class="fade-in">
        <div class="flex justify-between items-center mb-6">
            <button @click="subpage=''" class="text-emerald-600 font-bold">← カテゴリー選択に戻る</button>

            <button
                    @click="newsForm={id:null, title:'', content:'', cat:newsCategory}; subpage='news_form'"
                    class="bg-emerald-700 text-white px-6 py-2 rounded-full font-bold shadow-md hover:bg-emerald-800 transition"
            >
                + 新規告知作成
            </button>
        </div>

        <h3 class="text-2xl font-black mb-6"
            x-text="newsCategory === 'emergency' ? '緊急のお知らせ一覧' : (newsCategory === 'event' ? 'イベント告知一覧' : '通常お知らせ一覧')">
        </h3>

        <div class="bg-white rounded-3xl border shadow-sm divide-y overflow-hidden">

            <!-- ✅ 로딩 -->
            <div x-show="isNewsLoading" class="p-10 text-center text-slate-400 font-bold">
                불러오는 중...
            </div>

            <!-- ✅ 에러 -->
            <div x-show="!isNewsLoading && newsErrorMessage"
                 class="p-10 text-center text-red-600 font-bold"
                 x-text="newsErrorMessage">
            </div>

            <!-- ✅ 데이터 없음 -->
            <div x-show="!isNewsLoading && !newsErrorMessage && newsItems.length === 0"
                 class="p-10 text-center text-slate-400">
                해당 카테고리에 등록된 공지가 없습니다.
            </div>

            <!-- ✅ 목록 (서버에서 cat별로 받아오면 filter 제거) -->
            <template x-for="item in newsItems" :key="item.id">
                <div class="p-6 hover:bg-slate-50 flex justify-between items-center transition group">
                    <div @click="selectedNews = item; subpage = 'news_detail'" class="flex-1 cursor-pointer">
                        <span class="text-xs text-slate-400 block mb-1" x-text="item.date"></span>
                        <span class="font-bold text-lg" x-text="item.title"></span>
                    </div>

                    <div class="flex items-center space-x-2">
                        <div class="flex space-x-1">
                            <button @click.stop="editNews(item)"
                                    class="p-2 text-slate-400 hover:text-emerald-600 hover:bg-emerald-50 rounded-full transition">✏️</button>
                            <button @click.stop="deleteNews(item.id)"
                                    class="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-full transition">🗑️</button>
                        </div>
                        <span class="text-slate-300">❯</span>
                    </div>
                </div>
            </template>

        </div>
    </div>


    <div x-show="subpage === 'news_detail'" class="fade-in">
        <button @click="subpage='news_list'" class="mb-6 text-emerald-600 font-bold">← 目録へ戻る</button>
        <div class="bg-white p-12 rounded-[40px] shadow-xl border">
            <p class="text-emerald-600 font-bold mb-2 text-sm" x-text="selectedNews?.date"></p>
            <h2 class="text-4xl font-black mb-8 leading-tight" x-text="selectedNews?.title"></h2>
            <div class="text-lg leading-relaxed text-slate-600 whitespace-pre-wrap" x-text="selectedNews?.content"></div>
        </div>
    </div>

    <div x-show="subpage === 'news_form'" class="fade-in max-w-2xl mx-auto">
        <button @click="subpage='news_list'" class="mb-6 text-emerald-600 font-bold">← キャンセルして戻る</button>

        <div class="bg-white p-8 md:p-12 rounded-[40px] shadow-xl border">
            <h2 class="text-3xl font-black mb-8" x-text="newsForm.id ? '告知を編集' : '新規告知作成'"></h2>

            <div class="space-y-6">
                <div>
                    <label class="block font-bold mb-2">カテゴリー</label>
                    <select x-model="newsForm.cat" class="w-full border-2 border-slate-100 p-4 rounded-2xl bg-slate-50 outline-none focus:border-emerald-500">
                        <option value="normal">通常お知らせ</option>
                        <option value="event">イベント告知</option>
                        <option value="emergency">緊急告知</option>
                    </select>
                </div>

                <div>
                    <label class="block font-bold mb-2">タイトル</label>
                    <input type="text" x-model="newsForm.title" placeholder="告知のタイトルを入力"
                           class="w-full border-2 border-slate-100 p-4 rounded-2xl bg-slate-50 outline-none focus:border-emerald-500">
                </div>

                <div>
                    <label class="block font-bold mb-2">本文</label>
                    <textarea x-model="newsForm.content" rows="8" placeholder="告知の内容を入力してください"
                              class="w-full border-2 border-slate-100 p-4 rounded-2xl bg-slate-50 outline-none focus:border-emerald-500"></textarea>
                </div>

                <button @click="saveNews()"
                        class="w-full bg-emerald-700 text-white py-4 rounded-2xl font-bold text-xl shadow-lg hover:bg-emerald-800 transition">
                    告知を保存する
                </button>
            </div>
        </div>
    </div>

    <div x-show="subpage === 'price'" class="max-w-4xl mx-auto">
        <button @click="subpage=''" class="mb-4 text-emerald-600 font-bold">← 戻る</button>
        <h2 class="text-3xl font-black mb-8 text-center">料金詳細</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-8 rounded-3xl shadow-sm border">
                <h3 class="text-xl font-bold text-emerald-800 mb-6 border-b pb-2">基本プラン</h3>
                <div class="space-y-4">
                    <div class="flex justify-between"><span>1時間</span><span class="font-black">1,000円</span></div>
                    <div class="flex justify-between bg-emerald-50 p-2 rounded"><span>2時間パック (NEW!)</span><span class="font-black">2,000円</span></div>
                    <div class="flex justify-between"><span>3時間パック</span><span class="font-black">2,500円</span></div>
                    <div class="flex justify-between bg-emerald-50 p-2 rounded"><span>4時間パック (NEW!)</span><span class="font-black">3,500円</span></div>
                    <div class="flex justify-between"><span>5時間パック</span><span class="font-black">4,000円</span></div>
                </div>
            </div>

            <div class="bg-white p-8 rounded-3xl shadow-sm border">
                <h3 class="text-xl font-bold text-orange-800 mb-6 border-b pb-2">特別席オプション</h3>
                <div class="space-y-6">
                    <div class="p-3 bg-red-50 rounded-xl border border-red-100">
                        <p class="font-bold text-red-700">カップル席（赤）</p>
                        <p class="text-sm">基本料 + 1,000円</p>
                    </div>
                    <div class="p-3 bg-yellow-50 rounded-xl border border-yellow-200">
                        <p class="font-bold text-yellow-700">会議室貸切（黄）</p>
                        <p class="text-sm">基本料 + 2,000円</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div x-show="subpage === 'faq'" class="max-w-3xl mx-auto">
        <button @click="subpage=''" class="mb-4 text-emerald-600 font-bold">← 戻る</button>
        <h2 class="text-3xl font-black mb-8">よくある質問</h2>
        <div class="space-y-4">
            <template x-for="i in 5" :key="i">
                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <p class="font-bold text-emerald-800 mb-2">Q. 持ち込みでの食事は可能ですか？</p>
                    <p class="text-slate-600">A. 匂いの強くない軽食であればラウンジエリアにて可能です。座席での本格的な食事はご遠慮ください。</p>
                </div>
            </template>
        </div>
    </div>

    <div x-show="subpage === 'basic_info'" class="max-w-4xl mx-auto">
        <button @click="subpage=''" class="mb-4 text-emerald-600 font-bold">← 戻る</button>
        <div class="bg-white p-10 rounded-3xl shadow border grid grid-cols-1 md:grid-cols-2 gap-10">
            <div>
                <h3 class="text-2xl font-black mb-6">基本情報</h3>
                <div class="space-y-4">
                    <p><strong>住所：</strong> 東京都渋谷区〇〇 1-2-3</p>
                    <p><strong>電話：</strong> 03-1234-5678</p>
                    <p><strong>営業時間：</strong> 24時間営業 / 年中無休</p>
                </div>
            </div>
            <div class="h-64 bg-slate-100 rounded-2xl flex items-center justify-center font-bold text-slate-400">[ Google Map 埋め込み ]</div>
        </div>
    </div>
</main>

<th:block th:replace="admin/admin-fragments :: footer"></th:block>
</body>
</html>
