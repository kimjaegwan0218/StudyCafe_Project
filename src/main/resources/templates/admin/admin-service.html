<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="admin/admin-fragments :: head('StudyCafe Admin - Service')"></th:block>
</head>
<body class="bg-slate-50 text-slate-800" x-data="adminApp()" x-cloak>
<th:block th:replace="admin/admin-fragments :: nav('service')"></th:block>

<main class="max-w-7xl mx-auto mt-6 p-4 fade-in">
    <div class="max-w-6xl mx-auto">
        <h2 class="text-3xl font-black mb-12 text-center text-emerald-900 border-b pb-6">提供サービス一覧</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <template x-for="s in [
          {t:'フリードリンク & おやつ', d:'最高級コーヒーやハーブティー、日替わりおやつを提供。', img:'1495474472287-4d71bcdd2085'},
          {t:'事務用デスクトップPC', d:'大画面モニター2台。複雑な資料作成も効率よく。', img:'1517694712202-14dd9538aa97'},
          {t:'高性能複合機', d:'資料の印刷・スキャン・コピーがクラウド連携。', img:'1588702547919-26089e690cee'},
          {t:'ノートPC無料貸出', d:'MacBookや最新WindowsPCを完備。', img:'1496181133206-80ce9b88a853'}
        ]" :key="s.t">
                <div class="bg-white rounded-3xl shadow-sm border overflow-hidden flex h-48 hover:shadow-lg transition">
                    <img :src="`https://images.unsplash.com/photo-${s.img}?w=400`" class="w-48 object-cover">
                    <div class="p-8">
                        <h3 class="text-xl font-black text-emerald-700 mb-3" x-text="s.t"></h3>
                        <p class="text-sm text-slate-500 leading-relaxed" x-text="s.d"></p>
                    </div>
                </div>
            </template>
        </div>
    </div>
</main>

<th:block th:replace="admin/admin-fragments :: footer"></th:block>
</body>
</html>
