<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="admin/admin-fragments :: head('StudyCafe Admin - Login')"></th:block>
</head>
<body class="bg-slate-50 text-slate-800" x-data="adminApp()" x-cloak>
<th:block th:replace="admin/admin-fragments :: nav('login')"></th:block>

<main class="max-w-7xl mx-auto mt-6 p-4 fade-in">
    <div class="max-w-md mx-auto py-20">
        <div class="bg-white p-10 rounded-[40px] shadow-xl border text-center">
            <h2 class="text-3xl font-black mb-2 text-emerald-900">Admin Login</h2>
            <p class="text-slate-400 text-sm mb-10">管理者ログイン（デモ）</p>

            <div class="space-y-4">
                <input type="email" x-model="loginEmail" placeholder="メールアドレス"
                       class="w-full border-2 border-slate-50 p-4 rounded-2xl bg-slate-50 focus:border-emerald-500 outline-none transition">
                <input type="password" x-model="loginPassword" placeholder="パスワード"
                       class="w-full border-2 border-slate-50 p-4 rounded-2xl bg-slate-50 focus:border-emerald-500 outline-none transition">

                <button @click="login()"
                        class="w-full bg-emerald-700 text-white py-5 rounded-2xl font-bold shadow-xl hover:bg-emerald-800 transition mt-4">
                    ログインする
                </button>
            </div>

            <p class="mt-8 text-xs text-slate-400">
                ユーザー画面へ戻る: <a href="/" class="text-emerald-600 font-bold underline">HOME</a>
            </p>
        </div>
    </div>
</main>

<th:block th:replace="admin/admin-fragments :: footer"></th:block>
</body>
</html>
