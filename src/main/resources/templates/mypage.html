<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:x-transition="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>내 페이지 | StudyCafe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="/assets/js/mypage.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <style>
        [x-cloak] { display: none !important; }

        /* 모든 요소에 폰트 강제 적용 */
        * {
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif !important;
            letter-spacing: -0.02em;
        }
    </style>
</head>

<body x-data="mypage()"
      x-init="init(); if(new URLSearchParams(location.search).has('historyOpen')) historyModal = true"
      class="bg-white text-slate-800">


<nav class="bg-white border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <a href="/admin" class="text-2xl font-bold text-emerald-800">StudyCafe.</a>

        <div class="hidden md:flex space-x-6 font-bold text-sm items-center">

            <!-- 공지(드롭다운: 요금 안내/FAQ/기본정보•지도) -->
            <div class="relative inline-flex items-center h-full font-bold text-sm"
                 x-data="{ open:false }"
                 @mouseenter="open=true" @mouseleave="open=false">

                <a href="/news" class="py-4 hover:text-emerald-700 transition">공지</a>

                <div x-cloak x-show="open"
                     class="absolute top-full left-0 mt-2 w-48 bg-white border rounded-xl shadow-lg overflow-hidden z-50"
                     x-transition>
                    <a href="/price" class="block px-4 py-3 text-sm hover:bg-slate-50">요금 안내</a>
                    <a href="/faq" class="block px-4 py-3 text-sm hover:bg-slate-50">FAQ</a>
                    <a href="/info" class="block px-4 py-3 text-sm hover:bg-slate-50">기본정보 • 지도</a>
                </div>
            </div>
            <!-- 예약(드롭다운: 예약/구독) -->
            <div class="relative"
                 x-data="{ open:false, path: window.location.pathname }"
                 @mouseenter="open=true" @mouseleave="open=false">

                <a href="/booking"
                   :class="(path.startsWith('/booking') || path.startsWith('/subscription')) ? 'text-emerald-700' : ''">
                    예약
                </a>

                <div x-cloak x-show="open"
                     class="absolute left-0 mt-2 w-32 bg-white border rounded-xl shadow-lg overflow-hidden z-50">

                    <a href="/subscription"
                       class="block px-4 py-3 text-sm hover:bg-slate-50"
                       :class="path.startsWith('/subscription') ? 'text-emerald-700 font-bold' : ''">
                        구독 구매
                    </a>
                </div>
            </div>
            <a href="/service" class="hover:text-emerald-700 transition">서비스</a>
            <a href="/community" class="hover:text-emerald-700 transition">커뮤니티</a>

            <div sec:authorize="isAnonymous()">
                <a href="/login" class="bg-emerald-800 hover:bg-emerald-900 text-white px-6 py-2 rounded-full font-bold transition shadow-sm text-xs">
                    로그인
                </a>
            </div>

            <div sec:authorize="isAuthenticated()" class="flex items-center space-x-6">
                <a href="/mypage" class="text-emerald-700 font-bold">내 페이지</a>
                <form th:action="@{/logout}" method="post" class="inline">
                    <button class="text-slate-400 hover:text-red-500 transition ml-4">로그아웃</button>
                </form>
            </div>

        </div>
    </div>
</nav>

<main class="max-w-6xl mx-auto mt-12 px-4 pb-20">
    <h2 class="text-4xl font-black mb-10 text-slate-800 tracking-tight">내 페이지</h2>

    <div class="flex flex-col lg:flex-row gap-8 items-start">
        <div class="flex-1 w-full bg-white rounded-[2rem] p-10 border border-slate-200 shadow-sm relative overflow-hidden">
            <div class="flex justify-between items-start mb-8">
                <h3 class="text-emerald-700 font-bold text-lg">회원정보</h3>
                <button @click="view='edit_profile'" class="bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-bold px-5 py-2 rounded-full transition shadow-sm">
                    수정하기
                </button>
            </div>
            <div class="flex flex-col md:flex-row gap-10">
                <div class="flex-1 space-y-8">
                    <div>
                        <p class="text-slate-400 text-xs font-bold mb-1">성명</p>
                        <p class="text-xl font-bold text-slate-900" th:text="${user.name}">이름 없음</p>
                    </div>
                    <div class="border-t border-slate-100 w-12"></div>
                    <div>
                        <p class="text-slate-400 text-xs font-bold mb-1">메일</p>
                        <p class="text-lg font-medium text-slate-900" th:text="${user.email}">email@example.com</p>
                    </div>
                </div>
                <!-- ✅ 구독 로딩/있음/없음 분기 카드 -->
                <template x-if="subscriptionLoaded && subscription">
                    <div class="bg-emerald-50 rounded-2xl p-6 w-full md:w-72 relative overflow-hidden border border-emerald-100/50">
                        <span class="absolute bottom-[-10px] right-[-10px] text-7xl font-black text-emerald-200/40 italic select-none pointer-events-none">PASS</span>
                        <p class="text-[10px] font-bold text-emerald-600 tracking-widest mb-3 uppercase">Subscription Status</p>

                        <p class="text-2xl font-black text-emerald-900 mb-6 tracking-tight"
                           x-text="subscription.planName"></p>

                        <div class="flex items-baseline gap-1">
                            <span class="text-emerald-800 font-bold text-sm">나머지</span>
                            <span class="text-3xl font-black text-emerald-600"
                                  x-text="subscription.remainingDays"></span>
                            <span class="text-emerald-800 font-bold text-sm">일</span>
                        </div>
                    </div>
                </template>

                <template x-if="subscriptionLoaded && !subscription">
                    <div class="bg-gray-50 rounded-2xl p-6 w-full md:w-72 relative overflow-hidden border border-gray-200">
                        <p class="text-[10px] font-bold text-gray-500 tracking-widest mb-3 uppercase">Subscription Status</p>
                        <p class="text-lg font-black text-gray-800">구독 정보가 없습니다</p>
                    </div>
                </template>

                <!-- 로딩 중(선택): 깜빡임 싫으면 유지 -->
                <template x-if="!subscriptionLoaded">
                    <div class="bg-white rounded-2xl p-6 w-full md:w-72 border border-slate-200">
                        <p class="text-sm text-slate-400">구독 정보를 불러오는 중...</p>
                    </div>
                </template>

            </div>
        </div>

        <div class="w-full lg:w-72 flex flex-col gap-4">
            <button @click="historyModal = true"
                    class="w-full py-4 rounded-2xl border-2 border-emerald-700 text-emerald-700 font-bold text-center hover:bg-emerald-50 transition text-lg shadow-sm">
                문의 이력
            </button>
            <a href="/inquiry/write"
               class="w-full py-4 rounded-2xl bg-emerald-700 text-white font-bold text-center hover:bg-emerald-800 transition text-lg shadow-md shadow-emerald-200">
                신규 문의
            </a>
        </div>
    </div>

    <div x-cloak x-show="view==='edit_profile'"
         class="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">

        <div @click.away="view='dashboard'"
             class="bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl overflow-hidden relative">

            <button @click="view='dashboard'" class="absolute top-8 right-8 text-slate-300 hover:text-slate-500 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>

            <div class="p-10">
                <h2 class="text-2xl font-black text-emerald-900 mb-8">정보 수정</h2>

                <div class="p-10">
                    <h2 class="text-2xl font-black text-emerald-900 mb-8">정보 수정</h2>

                    <!-- ✅ 수정 폼 -->
                    <form th:action="@{/user/modify}" method="post" class="space-y-6">
                        <input type="hidden" name="id" th:value="${user.id}">

                        <div class="space-y-5">
                            <div>
                                <label class="block text-xs font-bold text-slate-400 mb-2 ml-1">이름</label>
                                <input type="text" name="name" th:value="${user.name}"
                                       class="w-full border border-slate-100 p-4 rounded-2xl bg-slate-50 outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                            </div>

                            <div>
                                <label class="block text-xs font-bold text-slate-400 mb-2 ml-1">전화번호</label>
                                <input type="text" name="phone" th:value="${user.phone}"
                                       class="w-full border border-slate-100 p-4 rounded-2xl bg-slate-50 outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                            </div>

                            <div>
                                <label class="block text-xs font-bold text-slate-400 mb-2 ml-1">이메일 주소</label>
                                <input type="email" name="email" th:value="${user.email}" readonly
                                       class="w-full border border-slate-100 p-4 rounded-2xl bg-slate-50 outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                            </div>
                        </div>

                        <button type="submit"
                                class="w-full bg-emerald-700 text-white py-5 rounded-[1.5rem] font-bold text-lg hover:bg-emerald-800 shadow-xl shadow-emerald-100 transition-all">
                            변경사항 저장
                        </button>
                    </form>

                    <!-- ✅ 탈퇴 폼 (수정 폼 밖!) -->
                    <div class="pt-4">
                        <form th:action="@{/user/delete/{id}(id=${user.id})}" method="post"
                              onsubmit="return confirm('정말로 탈퇴하시겠습니까? 모든 정보가 삭제됩니다.');">
                            <button type="submit" class="w-full py-4 ...">
                                회원 해지(탈퇴)
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="mt-20 border-t pt-10">
        <h3 class="text-2xl font-bold mb-6 text-slate-700">이용 내역</h3>
        <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
            <div class="p-6 bg-slate-50 border-b border-slate-100 font-bold text-slate-600">예약 내역</div>
            <!-- 로딩 중 -->
            <template x-if="!reservationsLoaded">
                <div class="p-12 text-center text-slate-400 text-sm">
                    예약 내역을 불러오는 중...
                </div>
            </template>

            <!-- 예약 있음 -->
            <template x-if="reservationsLoaded && reservations.length > 0">
                <div class="divide-y divide-slate-100 bg-white">
                    <template x-for="r in reservations" :key="r.reservationId">
                        <div class="p-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                            <div class="flex flex-col gap-1">
                                <div class="flex flex-wrap items-center gap-2">
                        <span class="font-bold text-slate-800"
                              x-text="`좌석 ${r.seatId} · ${r.seatType}`"></span>
                                </div>

                                <div class="text-sm text-slate-600">
                                    <span x-text="new Date(r.startAt).toLocaleString()"></span>
                                    <span class="text-slate-300 mx-1">~</span>
                                    <span x-text="new Date(r.endAt).toLocaleString()"></span>
                                    <span class="text-slate-300 mx-2">|</span>
                                    <span x-text="`${r.durationHours}시간`"></span>
                                </div>
                            </div>

                            <!-- 배지 2개: 이용상태 / 결제상태 -->
                            <div class="flex items-center gap-2">
                                <!-- 이용상태 -->
                                <span class="text-xs px-2.5 py-1 rounded-md font-bold"
                                      :class="r.useState === '이용중'
                                ? 'bg-emerald-100 text-emerald-700'
                                : (r.useState === '이용예정'
                                    ? 'bg-sky-100 text-sky-700'
                                    : (r.useState === '이용완료'
                                        ? 'bg-slate-100 text-slate-600'
                                        : (r.useState === '예약만료'
                                            ? 'bg-red-100 text-red-600'
                                            : 'bg-amber-100 text-amber-700')) )">
                        <span x-text="r.useState"></span>
                    </span>

                                <!-- 결제상태 -->
                                <span class="text-xs px-2.5 py-1 rounded-md font-bold"
                                      :class="r.paymentState === '결제완료'
                                ? 'bg-emerald-100 text-emerald-700'
                                : (r.paymentState === '결제만료'
                                    ? 'bg-red-100 text-red-600'
                                    : 'bg-amber-100 text-amber-700')">
                        <span x-text="r.paymentState"></span>
                    </span>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- 예약 없음 -->
            <template x-if="reservationsLoaded && reservations.length === 0">
                <div class="p-12 text-center text-slate-400 text-sm">
                    예약 내역이 없습니다.
                </div>
            </template>

        </div>
    </div>
</main>

<div x-cloak x-show="historyModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/40 backdrop-blur-sm p-4"
     x-transition.opacity>

    <div @click.away="historyModal = false"
         class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden transform transition-all"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100">

        <div class="p-6 bg-emerald-800 flex justify-between items-center text-white">
            <h3 class="text-xl font-bold">문의 이력</h3>
            <button @click="historyModal = false" class="text-emerald-200 hover:text-white text-2xl font-bold transition">&times;</button>
        </div>

        <div class="p-0 max-h-[60vh] overflow-y-auto bg-slate-50/50">
            <div th:if="${inquiries == null or inquiries.isEmpty()}" class="p-16 text-center text-slate-400">
                문의 내역이 없습니다.
            </div>

            <div th:if="${inquiries != null}" class="divide-y divide-slate-100 bg-white">

                <div th:each="inquiry : ${inquiries}" x-data="{ open: false, editMode: false }" class="p-6 transition group" :class="editMode ? 'bg-slate-50' : 'hover:bg-slate-50'">

                    <div x-show="!editMode">
                        <div class="flex justify-between items-start">
                            <div class="flex flex-col gap-1 cursor-pointer w-full" @click="open = !open">
                                <div class="flex items-center gap-2">
                                    <span class="font-bold text-slate-800 text-lg hover:text-emerald-700 transition" th:text="${inquiry.title}">문의 제목</span>
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400 transition-transform"
                                         :class="open ? 'rotate-180' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                                    </svg>
                                </div>
                                <span class="text-xs text-slate-400" th:text="${#temporals.format(inquiry.createdAt, 'yyyy-MM-dd')}"></span>
                                <span th:if="${inquiry.updatedAt != null and inquiry.updatedAt.isAfter(inquiry.createdAt)}"
                                      class="text-[10px] text-emerald-600 font-bold bg-emerald-50 px-1 rounded">
                                        수정됨
                                    </span>
                            </div>

                            <div class="flex flex-col items-end gap-3 shrink-0 ml-4">
                                <span class="text-xs px-2.5 py-1 rounded-md font-bold"
                                      th:classappend="${inquiry.status.name() == 'WAITING'} ? 'bg-slate-100 text-slate-500' : 'bg-emerald-100 text-emerald-700'"
                                      th:text="${inquiry.status.name() == 'WAITING' ? '답변대기' : '답변완료'}">상태</span>

                                <div class="flex gap-3 text-xs opacity-0 group-hover:opacity-100 transition-opacity duration-200">
                                    <button type="button" @click="editMode = true; open = true" class="text-slate-400 hover:text-emerald-600 font-medium">수정</button>
                                    <span class="text-slate-200">|</span>

                                    <form th:action="@{/inquiry/delete/{id}(id=${inquiry.id}, page=${inquiries.number})}"
                                          method="post"
                                          onsubmit="return confirm('정말 삭제하시겠습니까?');"
                                          class="inline">
                                        <button type="submit" class="text-slate-400 hover:text-red-500 font-medium">삭제</button>
                                    </form>
                                </div>
                            </div>
                        </div>

                        <div x-show="open" class="mt-4 pt-4 border-t border-slate-100 text-slate-600 text-sm leading-relaxed whitespace-pre-wrap"
                             x-transition>
                            <p th:text="${inquiry.content}"></p>
                        </div>
                    </div>

                    <form x-show="editMode" th:action="@{/inquiry/edit/{id}(id=${inquiry.id}, page=${inquiries.number})}" method="post" class="flex flex-col gap-3">

                        <input type="text" name="title" th:value="${inquiry.title}" required
                               class="w-full border border-emerald-300 rounded-lg px-3 py-2 font-bold text-slate-800 focus:outline-none focus:ring-2 focus:ring-emerald-500"
                               placeholder="제목을 입력하세요">

                        <textarea name="content" rows="4" required
                                  class="w-full border border-emerald-300 rounded-lg px-3 py-2 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 resize-none"
                                  th:text="${inquiry.content}"></textarea>

                        <div class="flex justify-end gap-2 mt-2">
                            <button type="button" @click="editMode = false"
                                    class="px-3 py-1.5 rounded-lg border bg-white text-slate-600 text-xs font-bold hover:bg-slate-50">
                                취소
                            </button>
                            <button type="submit"
                                    class="px-3 py-1.5 rounded-lg bg-emerald-700 text-white text-xs font-bold hover:bg-emerald-800 shadow-md">
                                수정하기
                            </button>
                        </div>
                    </form>

                </div>
            </div>
        </div>

        <div class="p-5 bg-white border-t border-slate-100 flex justify-between items-center">
            <ul th:if="${inquiries != null and !inquiries.isEmpty()}" class="flex gap-1.5 text-xs font-medium">
                <li th:if="${inquiries.hasPrevious}">
                    <a class="px-2.5 py-1.5 bg-white border border-slate-200 rounded-md hover:bg-slate-50 text-slate-600"
                       th:href="@{/mypage(page=${inquiries.number - 1}, historyOpen='true')}">이전</a>
                </li>

                <li th:each="page : ${#numbers.sequence(startPage, endPage)}">
                    <a th:href="@{/mypage(page=${page - 1}, historyOpen='true')}" th:text="${page}"
                       class="px-2.5 py-1.5 rounded-md border"
                       th:classappend="${page == nowPage} ? 'bg-emerald-600 text-white border-emerald-600' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'"></a>
                </li>

                <li th:if="${inquiries.hasNext}">
                    <a class="px-2.5 py-1.5 bg-white border border-slate-200 rounded-md hover:bg-slate-50 text-slate-600"
                       th:href="@{/mypage(page=${inquiries.number + 1}, historyOpen='true')}">다음</a>
                </li>
            </ul>

            <div th:if="${inquiries == null or inquiries.isEmpty()}"></div>
            <a href="/inquiry/write" class="flex items-center gap-1 text-sm font-bold text-emerald-700 hover:text-emerald-800 transition">
                <span>새 문의 작성</span> +
            </a>
        </div>
    </div>
</div>
<script th:inline="javascript">

    function confirmDelete() {
        // 타임리프가 서버에서 받은 id를 자바스크립트 변수에 직접 주입합니다.
        // 값이 없으면 null이 됩니다.
        const userId = [[${user?.id}]];

        // "null" 문자열이나 실제 null 값이 들어오는 경우를 방지합니다.
        if (!userId || userId === 'null') {
            alert("회원 정보를 찾을 수 없습니다. 다시 로그인해 주세요.");
            return;
        }

        if (confirm("정말로 탈퇴하시겠습니까? 모든 정보가 삭제됩니다.")) {
            // 이제 주소가 /user/delete/2 와 같이 숫자로 정상 생성됩니다.
            location.href = "/user/delete/" + userId;
        }
    }
</script>

</body>
</html>
