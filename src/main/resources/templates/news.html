<!DOCTYPE html>
<html lang="ja" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>News | StudyCafe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- ✅ news.js를 Alpine보다 먼저 (둘 다 defer면 실행 순서 보장됨) -->
    <script defer src="/assets/js/app.js"></script>
    <script defer src="/assets/js/news.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>

<body x-data="app()" class="bg-slate-50 text-slate-800">

<!-- ================= NAV ================= -->
<nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/admin" class="text-2xl font-bold text-emerald-800">StudyCafe.</a>
        <div class="hidden md:flex space-x-6 font-bold text-sm items-center">
            <!-- 공지(드롭다운: 요금 안내/FAQ/기본정보•지도) -->
            <div class="relative inline-flex items-center h-full font-bold text-sm"
                 x-data="{ open:false }"
                 @mouseenter="open=true" @mouseleave="open=false">

                <a href="/news" class="py-4 hover:text-emerald-700 transition">공지</a>

                <div x-cloak x-show="open"
                     class="absolute top-full left-0 mt-2 w-48 bg-white border rounded-xl shadow-lg overflow-hidden z-50"
                     x-transition>
                    <a href="/price" class="block px-4 py-3 text-sm hover:bg-slate-50">요금 안내</a>
                    <a href="/faq" class="block px-4 py-3 text-sm hover:bg-slate-50">FAQ</a>
                    <a href="/info" class="block px-4 py-3 text-sm hover:bg-slate-50">기본정보 • 지도</a>
                </div>
            </div>
            <!-- 예약(드롭다운: 예약/구독) -->
            <div class="relative"
                 x-data="{ open:false, path: window.location.pathname }"
                 @mouseenter="open=true" @mouseleave="open=false">

                <!-- ✅ 상단 '예약'은 booking/subscription일 때만 초록 -->
                <a href="/booking"
                   :class="(path.startsWith('/booking') || path.startsWith('/subscription'))
              ? 'text-emerald-700'
              : ''">
                    예약
                </a>

                <div x-cloak x-show="open"
                     class="absolute left-0 mt-2 w-32 bg-white border rounded-xl shadow-lg overflow-hidden z-50">

                    <!-- ✅ 드롭다운 내부도 현재 페이지면 강조 -->
                    <a href="/subscription"
                       class="block px-4 py-3 text-sm hover:bg-slate-50"
                       :class="path.startsWith('/subscription') ? 'text-emerald-700 font-bold' : ''">
                        구독 구매
                    </a>
                </div>
            </div>
            <a href="/service">서비스</a>
            <a href="/community">커뮤니티</a>

            <!-- 로그인 전 -->
            <div sec:authorize="isAnonymous()">
                <a href="/login" class="bg-emerald-800 hover:bg-emerald-900 text-white px-6 py-2 rounded-full font-bold transition shadow-sm text-xs">
                    로그인
                </a>
            </div>

            <div sec:authorize="isAuthenticated()" class="flex items-center space-x-6">
                <a href="/mypage" class="text-emerald-700 font-bold">내 페이지</a>
                <form th:action="@{/logout}" method="post" class="inline">
                    <button class="text-slate-400 hover:text-red-500 transition ml-4">로그아웃</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<!-- ================= MAIN ================= -->
<main
        x-data="newsPage()"
        class="max-w-5xl mx-auto mt-10 p-4"
>

    <!-- ===== CATEGORY (초기 화면) ===== -->
    <div x-cloak x-show="subpage === ''">
        <h2 class="text-3xl font-black mb-10 text-center">공지 카테고리</h2>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <button
                    @click="openCategory('emergency')"
                    class="p-10 bg-red-50 rounded-3xl border-2 border-red-100 hover:scale-105 transition">
                <span class="text-4xl block mb-4">🚨</span>
                <p class="font-bold text-red-700 text-xl">긴급 공지</p>
            </button>

            <button
                    @click="openCategory('event')"
                    class="p-10 bg-blue-50 rounded-3xl border-2 border-blue-100 hover:scale-105 transition">
                <span class="text-4xl block mb-4">🎁</span>
                <p class="font-bold text-blue-700 text-xl">이벤트 공지</p>
            </button>

            <button
                    @click="openCategory('normal')"
                    class="p-10 bg-slate-50 rounded-3xl border-2 border-slate-100 hover:scale-105 transition">
                <span class="text-4xl block mb-4">📢</span>
                <p class="font-bold text-slate-700 text-xl">일반 공지</p>
            </button>
        </div>
    </div>

    <!-- ===== LIST ===== -->
    <div x-cloak x-show="subpage === 'list'" class="fade-in">
        <button
                @click="backToCategory()"
                class="mb-6 text-emerald-600 font-bold">
            ← 카테고리로 돌아가기
        </button>

        <h3 class="text-2xl font-black mb-6"
            x-text="newsCategory === 'emergency' ? '긴급 공지사항 목록' : (newsCategory === 'event' ? '이벤트 공지 목록' : '일반 공지 목록')"></h3>

        <div class="bg-white rounded-3xl border shadow-sm divide-y overflow-hidden">
            <template x-for="item in newsItems.filter(i => i.cat === newsCategory)" :key="item.id">
                <div
                        @click="openDetail(item)"
                        class="p-6 hover:bg-slate-50 cursor-pointer flex justify-between items-center transition">
                    <div>
                        <span class="text-xs text-slate-400 block mb-1" x-text="item.date"></span>
                        <span class="font-bold text-lg" x-text="item.title"></span>
                    </div>
                    <span class="text-slate-300">❯</span>
                </div>
            </template>
        </div>
    </div>

    <!-- ===== DETAIL ===== -->
    <div x-cloak x-show="subpage === 'detail'" class="fade-in">
        <button
                @click="subpage='list'"
                class="mb-6 text-emerald-600 font-bold">
            ← 목록으로 돌아가기
        </button>

        <div class="bg-white p-12 rounded-[40px] shadow-xl border">
            <p class="text-emerald-600 font-bold mb-2 text-sm" x-text="selectedNews?.date"></p>
            <h2 class="text-4xl font-black mb-8 leading-tight" x-text="selectedNews?.title"></h2>
            <div class="text-lg leading-relaxed text-slate-600 whitespace-pre-wrap" x-text="selectedNews?.content"></div>
        </div>
    </div>

</main>

</body>
</html>
