<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 - StudyCafe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Toss Payments SDK -->
    <script src="https://js.tosspayments.com/v1/payment"></script>
</head>
<body class="bg-slate-50 min-h-screen">

<div class="max-w-lg mx-auto p-6 mt-10">

    <!-- 헤드ー -->
    <div class="text-center mb-10">
        <h1 class="text-3xl font-black text-emerald-800">StudyCafe.</h1>
        <p class="text-slate-500 mt-2">결제수속중</p>
    </div>

    <!-- 주문정보카드注文情報カード -->
    <div class="bg-white rounded-3xl shadow-lg p-8 mb-6">
        <h2 class="text-lg font-bold text-slate-800 mb-6">주문 내용</h2>

        <div class="space-y-4 text-sm">
            <div class="flex justify-between border-b pb-3">
                <span class="text-slate-500">주문 번호</span>
                <span class="font-mono" th:text="${orderId}">ORD-20240525-XXXX</span>
            </div>
            <div class="flex justify-between border-b pb-3">
                <span class="text-slate-500">내용</span>
                <span class="font-bold" th:text="${orderName}">StudyCafe 3시간팩</span>
            </div>
            <div class="flex justify-between pt-2">
                <span class="text-lg font-bold">지불 금액/span>
                <span class="text-2xl font-black text-emerald-700">
                        $<span th:text="${#numbers.formatInteger(amount, 0, 'COMMA')}">3,000</span>
                    </span>
            </div>
        </div>
    </div>

    <!-- 결제버튼영역決済ボタンエリア -->
    <div class="bg-white rounded-3xl shadow-lg p-8">
        <h2 class="text-lg font-bold text-slate-800 mb-6">결제 방법</h2>

        <!-- Toss Payments 결제버튼決済ボタン -->
        <div class="space-y-4">
            <button id="payment-button"
                    class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg
                               hover:bg-blue-700 transition shadow-lg flex items-center justify-center gap-2">
                <span>💳</span>
                <span>Toss Pay 로 결제하기</span>
            </button>

            <button id="card-button"
                    class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold text-lg
                               hover:bg-slate-900 transition shadow-lg flex items-center justify-center gap-2">
                <span>💳</span>
                <span>신용카드로결제하기</span>
            </button>
        </div>

        <p class="text-xs text-slate-400 text-center mt-6">
            결제는 Toss Payments가 안전하게 처리한다
        </p>
    </div>

    <!-- 돌아가는 링크 -->
    <div class="text-center mt-8">
        <a href="/booking" class="text-emerald-600 font-bold text-sm hover:underline">
            ← 예약 내용을 수정하기
        </a>
    </div>
</div>

<script th:inline="javascript">
    // Thymeleaf에서 수치를 받는다から値を受け取る
    const clientKey = /*[[${clientKey}]]*/ 'test_ck_xxx';
    const orderId = /*[[${orderId}]]*/ 'ORD-TEST';
    const amount = /*[[${amount}]]*/ 3000;
    const orderName = /*[[${orderName}]]*/ 'StudyCafe';

    // 直接フルURLを構築
    const baseUrl = window.location.origin;
    const successUrl = baseUrl + '/api/payments/toss/success';
    const failUrl = baseUrl + '/api/payments/toss/fail';

    console.log('successUrl:', successUrl);  // 디버그용도デバッグ用

    // Toss Payments 초기화初期化
    const tossPayments = TossPayments(clientKey);

    // Toss Pay 결제버튼決済ボタン
    document.getElementById('payment-button').addEventListener('click', function() {
        tossPayments.requestPayment('카드', {
            amount: amount,
            orderId: orderId,
            orderName: orderName,
            customerName: '고객명',
            successUrl: successUrl,
            failUrl: failUrl,
        }).catch(function(error) {
            if (error.code === 'USER_CANCEL') {
                console.log('결제가 취소 되었어요');
            } else {
                console.error('결제에러:', error);
                alert('결제 중에 에러가 발생했어요: ' + error.message);
            }
        });
    });

    // 카드결제버튼クレジットカード決済ボタン
    document.getElementById('card-button').addEventListener('click', function() {
        tossPayments.requestPayment('카드', {
            amount: amount,
            orderId: orderId,
            orderName: orderName,
            customerName: '고객명',
            successUrl: successUrl,
            failUrl: failUrl,
        }).catch(function(error) {
            if (error.code !== 'USER_CANCEL') {
                console.error('결제 에러:', error);
                alert('결제 중에 에러가 발생했어요: ' + error.message);
            }
        });
    });
</script>

</body>
</html>
